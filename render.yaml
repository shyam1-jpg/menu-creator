# Menu Creator PWA — Render Static Site (no Node server needed)
# New service: Dashboard → New → Blueprint → connect shyam1-jpg/menu-creator
# Existing service: enable Render Subdomain + Manual Deploy (see DEPLOY-NOW.bat)
services:
  - type: web
    name: menu-creator
    runtime: static
    repo: https://github.com/shyam1-jpg/menu-creator
    branch: main
    plan: free
    region: frankfurt
    autoDeploy: yes
    buildCommand: npm install && npm run build
    staticPublishPath: _site
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /service-worker.js
        name: Cache-Control
        value: no-cache, no-store, must-revalidate
      - path: /service-worker.js
        name: Service-Worker-Allowed
        value: /
      - path: /manifest.json
        name: Cache-Control
        value: public, max-age=3600
