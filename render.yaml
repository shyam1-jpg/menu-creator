# Menu Creator PWA — Render deploy (Kiteline ecosystem)
# Connect GitHub repo → New Blueprint → add custom domain menu.kiteline.uk
services:
  - type: web
    name: menu-creator
    runtime: node
    plan: free
    region: frankfurt
    buildCommand: npm install && npm run build
    startCommand: node server.js
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
    # After first deploy, add custom domain in Render UI:
    #   menu.kiteline.uk  (CNAME menu → menu-creator.onrender.com in GoDaddy)
